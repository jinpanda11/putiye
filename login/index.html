<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,viewport-fit=cover"/>
<meta name="theme-color" content="#1A1410"/><title>登录注册 · 菩提苑</title>
<link rel="icon" href="/favicon.svg"/>
<link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
<main class="main">
  <div class="page-hero">
    <div class="icon">钥</div>
    <h1>登录注册</h1>
    <p>守住缘分记录 · 跨设备找回功德</p>
  </div>

  <div class="feature-grid" style="max-width:760px;margin:0 auto;">
    <div class="card">
      <div class="section-title" style="margin-bottom:1rem;"><span class="deco"></span>登录账号</div>
      <div class="form-group">
        <label class="form-label">账号</label>
        <input class="form-input" id="login-account-page" placeholder="账号 / 吉祥号" autocomplete="username" />
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input class="form-input" id="login-password-page" type="password" placeholder="输入密码" autocomplete="current-password" />
      </div>
      <button class="btn btn-gold btn-block" onclick="loginFromPage()">登录</button>
    </div>

    <div class="card">
      <div class="section-title" style="margin-bottom:1rem;"><span class="deco"></span>注册账号</div>
      <div class="form-group">
        <label class="form-label">账号</label>
        <input class="form-input" id="reg-username-page" placeholder="3-24 位字母、数字或下划线" autocomplete="username" />
      </div>
      <div class="form-group">
        <label class="form-label">昵称</label>
        <input class="form-input" id="reg-nickname-page" placeholder="可选" />
      </div>
      <div class="form-group">
        <label class="form-label">邮箱</label>
        <input class="form-input" id="reg-email-page" type="email" placeholder="可选，用于找回账号" />
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input class="form-input" id="reg-password-page" type="password" placeholder="至少 6 位" autocomplete="new-password" />
      </div>
      <button class="btn btn-gold btn-block" onclick="registerFromPage()">注册</button>
      <p style="color:var(--ink-muted);font-size:0.78rem;line-height:1.8;margin-top:0.75rem;">提示：系统里的第一个正式注册账号会自动成为管理员。</p>
    </div>
  </div>
</main>
<script src="/static/js/app.js"></script>
<script>
async function loginFromPage() {
  const account = document.getElementById('login-account-page').value.trim();
  const password = document.getElementById('login-password-page').value;
  if (!account || !password) { showToast('请输入账号和密码'); return; }
  const res = await api_post('/auth/login', { account, password, device_id: getDeviceId() });
  if (res.code === 0 && res.data) {
    TOKEN = res.data.token;
    CURRENT_USER = res.data.user;
    localStorage.setItem('putiyuan_token', TOKEN);
    showToast('登录成功');
    location.href = CURRENT_USER.is_admin ? '/admin/' : '/profile/';
  } else {
    showToast(res.message || '登录失败');
  }
}

async function registerFromPage() {
  const username = document.getElementById('reg-username-page').value.trim();
  const nickname = document.getElementById('reg-nickname-page').value.trim();
  const email = document.getElementById('reg-email-page').value.trim();
  const password = document.getElementById('reg-password-page').value;
  if (!username || !password) { showToast('请输入账号和密码'); return; }
  const res = await api_post('/auth/register', { username, nickname, email: email || undefined, password, device_id: getDeviceId() });
  if (res.code === 0 && res.data) {
    TOKEN = res.data.token;
    CURRENT_USER = res.data.user;
    localStorage.setItem('putiyuan_token', TOKEN);
    showToast(CURRENT_USER.is_admin ? '注册成功，你已成为管理员' : '注册成功');
    location.href = CURRENT_USER.is_admin ? '/admin/' : '/profile/';
  } else {
    showToast(res.message || '注册失败');
  }
}
</script>
</body>
</html>
